<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐍 Neon Snake Game</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #0a0a0a;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }

        #gameContainer {
            text-align: center;
            position: relative;
        }

        h1 {
            font-size: 3em;
            margin-bottom: 20px;
            color: #fff;
            text-shadow:
                0 0 10px #00ff00,
                0 0 20px #00ff00,
                0 0 30px #00ff00,
                0 0 40px #00ff00;
            letter-spacing: 5px;
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 10px #00ff00, 0 0 20px #00ff00, 0 0 30px #00ff00; }
            to { text-shadow: 0 0 20px #00ff00, 0 0 30px #00ff00, 0 0 40px #00ff00, 0 0 50px #00ff00; }
        }

        #gameCanvas {
            border: 3px solid #00ff00;
            background: #000;
            box-shadow:
                0 0 20px #00ff00,
                0 0 40px #00ff00,
                inset 0 0 50px rgba(0, 255, 0, 0.1);
            display: block;
            margin: 0 auto;
        }

        #scoreBoard {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin: 20px 0;
            font-size: 1.5em;
        }

        .score-item {
            color: #fff;
            text-shadow: 0 0 10px #00ff00;
        }

        .score-value {
            color: #00ff00;
            font-weight: bold;
            text-shadow: 0 0 15px #00ff00;
        }

        #gameOver {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            padding: 40px;
            border-radius: 20px;
            border: 3px solid #ff00ff;
            box-shadow:
                0 0 20px #ff00ff,
                0 0 40px #ff00ff;
            z-index: 10;
        }

        #gameOver h2 {
            color: #ff00ff;
            font-size: 2.5em;
            margin-bottom: 20px;
            text-shadow: 0 0 20px #ff00ff;
        }

        #gameOver p {
            color: #fff;
            font-size: 1.5em;
            margin-bottom: 30px;
        }

        button {
            background: transparent;
            color: #00ff00;
            border: 2px solid #00ff00;
            padding: 15px 40px;
            font-size: 1.2em;
            font-family: 'Courier New', monospace;
            cursor: pointer;
            border-radius: 10px;
            box-shadow: 0 0 15px #00ff00;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        button:hover {
            background: #00ff00;
            color: #000;
            box-shadow: 0 0 30px #00ff00;
            transform: scale(1.05);
        }

        .controls {
            color: #666;
            margin-top: 20px;
            font-size: 0.9em;
        }

        .controls span {
            color: #00ff00;
            text-shadow: 0 0 5px #00ff00;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <h1>🐍 NEON SNAKE</h1>

        <div id="scoreBoard">
            <div class="score-item">
                ĐIỂM: <span class="score-value" id="score">0</span>
            </div>
            <div class="score-item">
                BEST: <span class="score-value" id="highScore">0</span>
            </div>
        </div>

        <canvas id="gameCanvas" width="600" height="600"></canvas>

        <div class="controls">
            Điều khiển: <span>← ↑ → ↓</span> hoặc <span>W A S D</span>
        </div>

        <div id="gameOver">
            <h2>GAME OVER</h2>
            <p>Điểm của bạn: <span id="finalScore">0</span></p>
            <button onclick="restartGame()">CHƠI LẠI</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake = [{ x: 10, y: 10 }];
        let dx = 1, dy = 0;
        let food = { x: 15, y: 15 };
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameRunning = true;
        let gameSpeed = 100;
        let lastRenderTime = 0;

        document.getElementById('highScore').textContent = highScore;

        // Draw neon snake
        function drawSnake() {
            snake.forEach((segment, index) => {
                // Glow effect
                ctx.shadowBlur = 20;
                ctx.shadowColor = '#00ff00';

                // Head
                if (index === 0) {
                    ctx.fillStyle = '#00ff00';
                    ctx.strokeStyle = '#00ffff';
                    ctx.lineWidth = 2;
                } else {
                    // Body gradient
                    const gradient = ctx.createRadialGradient(
                        segment.x * gridSize + gridSize/2,
                        segment.y * gridSize + gridSize/2,
                        0,
                        segment.x * gridSize + gridSize/2,
                        segment.y * gridSize + gridSize/2,
                        gridSize
                    );
                    gradient.addColorStop(0, '#00ff00');
                    gradient.addColorStop(1, '#005500');
                    ctx.fillStyle = gradient;
                }

                ctx.fillRect(
                    segment.x * gridSize + 2,
                    segment.y * gridSize + 2,
                    gridSize - 4,
                    gridSize - 4
                );

                if (index === 0) {
                    ctx.strokeRect(
                        segment.x * gridSize + 2,
                        segment.y * gridSize + 2,
                        gridSize - 4,
                        gridSize - 4
                    );
                }
            });
            ctx.shadowBlur = 0;
        }

        // Draw neon food
        function drawFood() {
            ctx.shadowBlur = 30;
            ctx.shadowColor = '#ff00ff';

            const gradient = ctx.createRadialGradient(
                food.x * gridSize + gridSize/2,
                food.y * gridSize + gridSize/2,
                0,
                food.x * gridSize + gridSize/2,
                food.y * gridSize + gridSize/2,
                gridSize
            );
            gradient.addColorStop(0, '#ff00ff');
            gradient.addColorStop(0.5, '#ff0088');
            gradient.addColorStop(1, '#880044');

            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(
                food.x * gridSize + gridSize/2,
                food.y * gridSize + gridSize/2,
                gridSize/2 - 2,
                0,
                Math.PI * 2
            );
            ctx.fill();

            ctx.shadowBlur = 0;
        }

        // Draw grid
        function drawGrid() {
            ctx.strokeStyle = 'rgba(0, 255, 0, 0.1)';
            ctx.lineWidth = 1;

            for (let i = 0; i <= tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }
        }

        function moveSnake() {
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };

            // Wall collision
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                endGame();
                return;
            }

            // Self collision
            if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
                endGame();
                return;
            }

            snake.unshift(head);

            // Check food
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                document.getElementById('score').textContent = score;
                generateFood();
                gameSpeed = Math.max(50, gameSpeed - 2);
            } else {
                snake.pop();
            }
        }

        function generateFood() {
            do {
                food = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                };
            } while (snake.some(segment => segment.x === food.x && segment.y === food.y));
        }

        function gameLoop(currentTime) {
            if (!gameRunning) return;

            requestAnimationFrame(gameLoop);

            const timeSinceLastRender = currentTime - lastRenderTime;
            if (timeSinceLastRender < gameSpeed) return;

            lastRenderTime = currentTime;

            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            drawGrid();
            drawFood();
            moveSnake();
            drawSnake();
        }

        function endGame() {
            gameRunning = false;
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').style.display = 'block';

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
                document.getElementById('highScore').textContent = highScore;
            }
        }

        function restartGame() {
            snake = [{ x: 10, y: 10 }];
            dx = 1;
            dy = 0;
            score = 0;
            gameSpeed = 100;
            gameRunning = true;
            document.getElementById('score').textContent = score;
            document.getElementById('gameOver').style.display = 'none';
            generateFood();
            lastRenderTime = 0;
            requestAnimationFrame(gameLoop);
        }

        // Controls
        document.addEventListener('keydown', (e) => {
            switch(e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    if (dy === 0) { dx = 0; dy = -1; }
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    if (dy === 0) { dx = 0; dy = 1; }
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    if (dx === 0) { dx = -1; dy = 0; }
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    if (dx === 0) { dx = 1; dy = 0; }
                    break;
            }
            e.preventDefault();
        });

        // Touch controls for mobile
        let touchStartX = 0;
        let touchStartY = 0;

        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });

        canvas.addEventListener('touchend', (e) => {
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;

            const deltaX = touchEndX - touchStartX;
            const deltaY = touchEndY - touchStartY;

            if (Math.abs(deltaX) > Math.abs(deltaY)) {
                if (deltaX > 0 && dx === 0) { dx = 1; dy = 0; }
                else if (deltaX < 0 && dx === 0) { dx = -1; dy = 0; }
            } else {
                if (deltaY > 0 && dy === 0) { dx = 0; dy = 1; }
                else if (deltaY < 0 && dy === 0) { dx = 0; dy = -1; }
            }
        });

        // Start game
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
