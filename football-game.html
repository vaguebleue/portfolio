<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚽ Bóng Đá Mini</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            user-select: none;
        }

        .game-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .game-header {
            display: flex;
            align-items: center;
            gap: 40px;
            color: white;
        }

        .score-panel {
            background: #16213e;
            padding: 12px 30px;
            border-radius: 12px;
            text-align: center;
            min-width: 80px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .score-label {
            font-size: 0.75em;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.7;
        }

        .score-value {
            font-size: 2.5em;
            font-weight: bold;
            color: #e94560;
        }

        .vs {
            font-size: 1.5em;
            font-weight: bold;
            color: #e94560;
        }

        .timer {
            color: #ffd700;
            font-size: 1.5em;
            font-weight: bold;
            min-width: 60px;
            text-align: center;
        }

        canvas {
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5), 0 0 0 4px #16213e;
            cursor: none;
        }

        .game-footer {
            color: #aaa;
            font-size: 0.85em;
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .key-hint {
            background: #16213e;
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 0.8em;
        }

        .key-hint span {
            color: #e94560;
            font-weight: bold;
        }

        #goalFlash {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 5em;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.1s;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div class="game-wrapper">
        <div class="game-header">
            <div class="score-panel">
                <div class="score-label">Bạn</div>
                <div class="score-value" id="playerScore">0</div>
            </div>
            <div class="timer" id="timer">⚽ 90"</div>
            <div class="score-panel">
                <div class="score-label">Máy</div>
                <div class="score-value" id="aiScore">0</div>
            </div>
        </div>

        <canvas id="game"></canvas>

        <div class="game-footer">
            <div class="key-hint"><span>↑↓←→</span> hoặc <span>WASD</span> Di chuyển</div>
            <div class="key-hint"><span>Space</span> hoặc <span>Click</span> Sút bóng</div>
            <div class="key-hint"><span>R</span> Chơi lại</div>
        </div>
    </div>

    <div id="goalFlash">⚽</div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');

        // Canvas size
        const W = 800;
        const H = 500;
        canvas.width = W;
        canvas.height = H;

        // ===== GAME STATE =====
        const FIELD_COLOR = '#2d8c3c';
        const FIELD_STRIPE = '#279636';
        const LINE_COLOR = 'rgba(255,255,255,0.6)';
        const PENALTY_COLOR = 'rgba(255,255,255,0.35)';

        // Goals
        const GOAL_WIDTH = 100;
        const GOAL_DEPTH = 30;
        const GOAL_Y = H / 2;

        let playerScore = 0;
        let aiScore = 0;

        // ===== BALL =====
        let ball = {
            x: W / 2,
            y: H / 2,
            r: 8,
            vx: 0,
            vy: 0,
            friction: 0.985,
            trail: []
        };

        // ===== PLAYER =====
        let player = {
            x: W * 0.3,
            y: H / 2,
            r: 16,
            vx: 0,
            vy: 0,
            speed: 3.5,
            kickPower: 12,
            kickCooldown: 0,
            color: '#4fc3f7',
            number: 7
        };

        // ===== AI =====
        let ai = {
            x: W * 0.7,
            y: H / 2,
            r: 16,
            vx: 0,
            vy: 0,
            speed: 2.4,
            kickPower: 10,
            kickCooldown: 0,
            color: '#ef5350',
            number: 9
        };

        // ===== INPUT =====
        const keys = {};
        let mouse = { x: W / 2, y: H / 2, down: false };

        window.addEventListener('keydown', e => {
            keys[e.key.toLowerCase()] = true;
            keys[e.code] = true;
            if (e.key.toLowerCase() === 'r') resetGame();
            e.preventDefault();
        });
        window.addEventListener('keyup', e => {
            keys[e.key.toLowerCase()] = false;
            keys[e.code] = false;
        });
        canvas.addEventListener('mousemove', e => {
            const rect = canvas.getBoundingClientRect();
            mouse.x = (e.clientX - rect.left) * (W / rect.width);
            mouse.y = (e.clientY - rect.top) * (H / rect.height);
        });
        canvas.addEventListener('mousedown', () => { mouse.down = true; });
        canvas.addEventListener('mouseup', () => { mouse.down = false; });
        canvas.addEventListener('contextmenu', e => e.preventDefault());

        // ===== PARTICLES =====
        let particles = [];

        function spawnParticles(x, y, color, count = 12) {
            for (let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 3 + 1;
                particles.push({
                    x, y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    life: 1,
                    decay: Math.random() * 0.03 + 0.02,
                    color,
                    r: Math.random() * 3 + 1
                });
            }
        }

        // ===== GAME TIMER =====
        let gameTime = 90; // seconds
        let gameOver = false;
        let gameOverTimer = 0;

        const timerInterval = setInterval(() => {
            if (!gameOver && gameTime > 0) {
                gameTime--;
                document.getElementById('timer').textContent = `⚽ ${gameTime}"`;
                if (gameTime <= 0) {
                    gameOver = true;
                    gameOverTimer = 180; // 3 seconds display
                }
            }
            if (gameOver && gameOverTimer > 0) {
                gameOverTimer--;
            }
        }, 1000);

        // ===== FLASH =====
        let flashAlpha = 0;
        function flashGoal() {
            flashAlpha = 1;
            const el = document.getElementById('goalFlash');
            el.style.opacity = '1';
            el.textContent = '⚽ GOAL!';
            setTimeout(() => { el.style.opacity = '0'; }, 1000);
        }

        function resetGame() {
            playerScore = 0;
            aiScore = 0;
            gameTime = 90;
            gameOver = false;
            gameOverTimer = 0;
            ball = { x: W / 2, y: H / 2, r: 8, vx: 0, vy: 0, friction: 0.985, trail: [] };
            player.x = W * 0.3;
            player.y = H / 2;
            player.vx = 0;
            player.vy = 0;
            player.kickCooldown = 0;
            ai.x = W * 0.7;
            ai.y = H / 2;
            ai.vx = 0;
            ai.vy = 0;
            ai.kickCooldown = 0;
            particles = [];
            document.getElementById('playerScore').textContent = '0';
            document.getElementById('aiScore').textContent = '0';
            document.getElementById('timer').textContent = '⚽ 90"';
        }

        function resetAfterGoal(scorer) {
            if (scorer === 'player') {
                // AI kickoff from center
                ball.x = W / 2;
                ball.y = H / 2;
                ball.vx = 3;
                ball.vy = (Math.random() - 0.5) * 4;
            } else {
                // Player kickoff from center
                ball.x = W / 2;
                ball.y = H / 2;
                ball.vx = -3;
                ball.vy = (Math.random() - 0.5) * 4;
            }
            player.x = W * 0.35;
            player.y = H / 2;
            ai.x = W * 0.65;
            ai.y = H / 2;
            player.vx = 0;
            player.vy = 0;
            ai.vx = 0;
            ai.vy = 0;
            player.kickCooldown = 0;
            ai.kickCooldown = 0;
        }

        // ===== COLLISION =====
        function dist(a, b) {
            return Math.hypot(a.x - b.x, a.y - b.y);
        }

        function resolveCollision(a, b, pushForce = 0.3) {
            const d = dist(a, b);
            const minDist = a.r + b.r;
            if (d < minDist && d > 0) {
                const nx = (a.x - b.x) / d;
                const ny = (a.y - b.y) / d;
                const overlap = minDist - d;
                a.x += nx * overlap * pushForce;
                a.y += ny * overlap * pushForce;
                b.x -= nx * overlap * pushForce;
                b.y -= ny * overlap * pushForce;
            }
        }

        // ===== KICK =====
        function kickBall(kicker, power) {
            const dx = ball.x - kicker.x;
            const dy = ball.y - kicker.y;
            const d = Math.hypot(dx, dy) || 1;
            const kickDist = kicker.r + ball.r + 15;

            if (d < kickDist && kicker.kickCooldown <= 0) {
                const nx = dx / d;
                const ny = dy / d;
                ball.vx = nx * power;
                ball.vy = ny * power;
                kicker.kickCooldown = 20;
                spawnParticles(ball.x, ball.y, '#ffd700', 8);
            }
        }

        // ===== GOAL CHECK =====
        function checkGoal() {
            // Left goal (AI's goal - player scores here)
            if (ball.x - ball.r < 0 && ball.y > GOAL_Y - GOAL_WIDTH / 2 && ball.y < GOAL_Y + GOAL_WIDTH / 2) {
                playerScore++;
                document.getElementById('playerScore').textContent = playerScore;
                flashGoal();
                spawnParticles(W * 0.05, H / 2, '#4fc3f7', 30);
                resetAfterGoal('player');
                return;
            }
            // Right goal (Player's goal - AI scores here)
            if (ball.x + ball.r > W && ball.y > GOAL_Y - GOAL_WIDTH / 2 && ball.y < GOAL_Y + GOAL_WIDTH / 2) {
                aiScore++;
                document.getElementById('aiScore').textContent = aiScore;
                flashGoal();
                spawnParticles(W * 0.95, H / 2, '#ef5350', 30);
                resetAfterGoal('ai');
                return;
            }

            // Side netting - bounce off back
            if (ball.x - ball.r < 0 && (ball.y < GOAL_Y - GOAL_WIDTH / 2 || ball.y > GOAL_Y + GOAL_WIDTH / 2)) {
                ball.x = ball.r;
                ball.vx = Math.abs(ball.vx) * 0.5;
            }
            if (ball.x + ball.r > W && (ball.y < GOAL_Y - GOAL_WIDTH / 2 || ball.y > GOAL_Y + GOAL_WIDTH / 2)) {
                ball.x = W - ball.r;
                ball.vx = -Math.abs(ball.vx) * 0.5;
            }
        }

        // ===== BOUNDARIES =====
        function applyBoundaries(entity) {
            // Top/bottom walls
            if (entity.y - entity.r < 0) {
                entity.y = entity.r;
                entity.vy = Math.abs(entity.vy) * 0.4;
            }
            if (entity.y + entity.r > H) {
                entity.y = H - entity.r;
                entity.vy = -Math.abs(entity.vy) * 0.4;
            }

            // Left/right (goal areas)
            if (entity.x - entity.r < 0) {
                if (!(entity.y > GOAL_Y - GOAL_WIDTH / 2 && entity.y < GOAL_Y + GOAL_WIDTH / 2)) {
                    entity.x = entity.r;
                    entity.vx = Math.abs(entity.vx) * 0.4;
                }
            }
            if (entity.x + entity.r > W) {
                if (!(entity.y > GOAL_Y - GOAL_WIDTH / 2 && entity.y < GOAL_Y + GOAL_WIDTH / 2)) {
                    entity.x = W - entity.r;
                    entity.vx = -Math.abs(entity.vx) * 0.4;
                }
            }
        }

        // ===== AI LOGIC =====
        function updateAI() {
            // Decide target based on ball position and possession
            const ballDist = dist(ai, ball);
            const ballInOwnHalf = ball.x < W / 2;
            const ballNearAI = ballDist < 60;

            let targetX, targetY;

            if (ball.x < ai.x && ballDist < 100) {
                // Ball is between AI and own goal - chase it
                targetX = ball.x;
                targetY = ball.y;
            } else if (ballInOwnHalf && ballDist < 150) {
                // Ball in own half - try to intercept
                targetX = ball.x + (ball.vx * 10);
                targetY = ball.y + (ball.vy * 10);
            } else {
                // Defensive position
                targetX = W * 0.65;
                targetY = Math.max(ball.r + 10, Math.min(H - ball.r - 10, ball.y * 0.7 + H / 2 * 0.3));
            }

            // If AI has the ball near it and is not on cooldown, kick toward player's goal
            if (ballDist < ai.r + ball.r + 12 && ai.kickCooldown <= 0 && ball.x < W * 0.85) {
                // Aim slightly randomly toward the right goal
                const aimY = GOAL_Y + (Math.random() - 0.5) * GOAL_WIDTH * 0.7;
                const aimX = W;
                const angle = Math.atan2(aimY - ball.y, aimX - ball.x);
                const jitter = (Math.random() - 0.5) * 0.4; // AI isn't perfect
                ball.vx = Math.cos(angle + jitter) * ai.kickPower;
                ball.vy = Math.sin(angle + jitter) * ai.kickPower;
                ai.kickCooldown = 15;
                spawnParticles(ball.x, ball.y, '#ef5350', 6);
            }

            // Move toward target
            const dx = targetX - ai.x;
            const dy = targetY - ai.y;
            const d = Math.hypot(dx, dy) || 1;

            if (d > 2) {
                ai.vx += (dx / d) * 0.25;
                ai.vy += (dy / d) * 0.25;
            }

            // Don't push the ball into own goal
            if (ai.x > W * 0.8 && ballDist < 50 && ball.x > ai.x) {
                ai.vx -= 0.2;
            }
        }

        // ===== PLAYER INPUT =====
        function updatePlayer() {
            let inputX = 0;
            let inputY = 0;

            if (keys['arrowleft'] || keys['a']) inputX -= 1;
            if (keys['arrowright'] || keys['d']) inputX += 1;
            if (keys['arrowup'] || keys['w']) inputY -= 1;
            if (keys['arrowdown'] || keys['s']) inputY += 1;

            // Normalize diagonal movement
            if (inputX !== 0 && inputY !== 0) {
                inputX *= 0.707;
                inputY *= 0.707;
            }

            player.vx += inputX * 0.35;
            player.vy += inputY * 0.35;

            // Kick with space or click
            if ((keys['space'] || keys[' '] || mouse.down) && player.kickCooldown <= 0) {
                kickBall(player, player.kickPower);
            }
        }

        // ===== UPDATE =====
        function update() {
            if (gameOver) return;

            // Update player
            updatePlayer();
            player.x += player.vx;
            player.y += player.vy;
            player.vx *= 0.85;
            player.vy *= 0.85;
            applyBoundaries(player);

            // Update AI
            updateAI();
            ai.x += ai.vx;
            ai.y += ai.vy;
            ai.vx *= 0.88;
            ai.vy *= 0.88;
            applyBoundaries(ai);

            // Update ball
            ball.x += ball.vx;
            ball.y += ball.vy;
            ball.vx *= ball.friction;
            ball.vy *= ball.friction;
            applyBoundaries(ball);

            // Stop very slow ball
            if (Math.abs(ball.vx) < 0.05) ball.vx = 0;
            if (Math.abs(ball.vy) < 0.05) ball.vy = 0;

            // Ball trail
            if (Math.abs(ball.vx) > 0.3 || Math.abs(ball.vy) > 0.3) {
                ball.trail.push({ x: ball.x, y: ball.y, life: 1 });
                if (ball.trail.length > 15) ball.trail.shift();
            }
            ball.trail.forEach(t => t.life -= 0.08);
            ball.trail = ball.trail.filter(t => t.life > 0);

            // Collisions
            resolveCollision(player, ball, 0.5);
            resolveCollision(ai, ball, 0.5);
            resolveCollision(player, ai, 0.3);

            // Check goal
            checkGoal();

            // Cooldowns
            if (player.kickCooldown > 0) player.kickCooldown--;
            if (ai.kickCooldown > 0) ai.kickCooldown--;

            // Update particles
            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.life -= p.decay;
            });
            particles = particles.filter(p => p.life > 0);

            // Flash
            if (flashAlpha > 0) flashAlpha -= 0.02;
        }

        // ===== DRAW =====
        function drawField() {
            // Grass
            ctx.fillStyle = FIELD_COLOR;
            ctx.fillRect(0, 0, W, H);

            // Grass stripes
            const stripeWidth = 40;
            for (let x = 0; x < W; x += stripeWidth * 2) {
                ctx.fillStyle = FIELD_STRIPE;
                ctx.fillRect(x, 0, stripeWidth, H);
            }

            // Field markings
            ctx.strokeStyle = LINE_COLOR;
            ctx.lineWidth = 2;

            // Outer boundary
            ctx.strokeRect(0, 0, W, H);

            // Center line
            ctx.beginPath();
            ctx.moveTo(W / 2, 0);
            ctx.lineTo(W / 2, H);
            ctx.stroke();

            // Center circle
            ctx.beginPath();
            ctx.arc(W / 2, H / 2, 60, 0, Math.PI * 2);
            ctx.stroke();

            // Center dot
            ctx.beginPath();
            ctx.arc(W / 2, H / 2, 4, 0, Math.PI * 2);
            ctx.fillStyle = LINE_COLOR;
            ctx.fill();

            // Penalty areas
            ctx.strokeStyle = PENALTY_COLOR;
            ctx.lineWidth = 1.5;

            // Left penalty area
            ctx.strokeRect(0, GOAL_Y - GOAL_WIDTH, GOAL_DEPTH + 70, GOAL_WIDTH * 2);

            // Right penalty area
            ctx.strokeRect(W - GOAL_DEPTH - 70, GOAL_Y - GOAL_WIDTH, GOAL_DEPTH + 70, GOAL_WIDTH * 2);

            // Goals
            ctx.fillStyle = 'rgba(255,255,255,0.15)';
            ctx.fillRect(0, GOAL_Y - GOAL_WIDTH / 2, GOAL_DEPTH, GOAL_WIDTH);
            ctx.fillRect(W - GOAL_DEPTH, GOAL_Y - GOAL_WIDTH / 2, GOAL_DEPTH, GOAL_WIDTH);

            // Goal posts
            ctx.strokeStyle = 'white';
            ctx.lineWidth = 4;
            // Left goal
            ctx.strokeRect(0, GOAL_Y - GOAL_WIDTH / 2, GOAL_DEPTH, GOAL_WIDTH);
            // Right goal
            ctx.strokeRect(W - GOAL_DEPTH, GOAL_Y - GOAL_WIDTH / 2, GOAL_DEPTH, GOAL_WIDTH);

            // Corner arcs
            const cornerR = 20;
            const corners = [
                [0, 0, -Math.PI / 2, 0],
                [W, 0, Math.PI, Math.PI / 2],
                [0, H, 0, Math.PI / 2],
                [W, H, Math.PI / 2, Math.PI]
            ];
            ctx.strokeStyle = LINE_COLOR;
            ctx.lineWidth = 2;
            corners.forEach(([cx, cy, sa, ea]) => {
                ctx.beginPath();
                ctx.arc(cx, cy, cornerR, sa, ea);
                ctx.stroke();
            });
        }

        function drawPlayerCircle(entity) {
            // Shadow
            ctx.beginPath();
            ctx.arc(entity.x + 2, entity.y + 2, entity.r, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(0,0,0,0.3)';
            ctx.fill();

            // Body
            const gradient = ctx.createRadialGradient(entity.x - 3, entity.y - 3, entity.r * 0.2, entity.x, entity.y, entity.r);
            gradient.addColorStop(0, '#ffffff');
            gradient.addColorStop(0.5, entity.color);
            gradient.addColorStop(1, '#00000040');
            ctx.beginPath();
            ctx.arc(entity.x, entity.y, entity.r, 0, Math.PI * 2);
            ctx.fillStyle = gradient;
            ctx.fill();
            ctx.strokeStyle = 'rgba(255,255,255,0.5)';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Number
            ctx.fillStyle = 'white';
            ctx.font = `bold ${entity.r * 0.8}px 'Segoe UI'`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(entity.number, entity.x, entity.y + 1);
        }

        function drawBall() {
            // Trail
            ball.trail.forEach(t => {
                ctx.beginPath();
                ctx.arc(t.x, t.y, ball.r * t.life * 0.6, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255,255,255,${t.life * 0.2})`;
                ctx.fill();
            });

            // Shadow
            ctx.beginPath();
            ctx.arc(ball.x + 2, ball.y + 2, ball.r, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(0,0,0,0.3)';
            ctx.fill();

            // Ball classic pattern
            const ballGrad = ctx.createRadialGradient(ball.x - 2, ball.y - 2, ball.r * 0.1, ball.x, ball.y, ball.r);
            ballGrad.addColorStop(0, '#ffffff');
            ballGrad.addColorStop(0.8, '#e0e0e0');
            ballGrad.addColorStop(1, '#999');
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
            ctx.fillStyle = ballGrad;
            ctx.fill();
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 1;
            ctx.stroke();

            // Pentagon pattern
            for (let i = 0; i < 5; i++) {
                const angle = (i / 5) * Math.PI * 2 + (ball.x * 0.01);
                const px = ball.x + Math.cos(angle) * ball.r * 0.5;
                const py = ball.y + Math.sin(angle) * ball.r * 0.5;
                ctx.beginPath();
                ctx.arc(px, py, ball.r * 0.3, 0, Math.PI * 2);
                ctx.fillStyle = '#333';
                ctx.fill();
            }
        }

        function drawParticles() {
            particles.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
                ctx.fillStyle = p.color.replace(')', `,${p.life})`).replace('rgb', 'rgba');
                if (p.color.startsWith('#')) {
                    const hex = p.color;
                    const r = parseInt(hex.slice(1, 3), 16);
                    const g = parseInt(hex.slice(3, 5), 16);
                    const b = parseInt(hex.slice(5, 7), 16);
                    ctx.fillStyle = `rgba(${r},${g},${b},${p.life})`;
                }
                ctx.fill();
            });
        }

        function drawOverlay() {
            // Game Over screen
            if (gameOver && gameOverTimer > 0) {
                ctx.fillStyle = `rgba(0,0,0,${Math.min(0.7, (180 - gameOverTimer) / 100)})`;
                ctx.fillRect(0, 0, W, H);

                ctx.fillStyle = 'white';
                ctx.font = 'bold 48px "Segoe UI"';
                ctx.textAlign = 'center';
                ctx.fillText('HẾT GIỜ!', W / 2, H / 2 - 30);

                let resultText;
                if (playerScore > aiScore) resultText = '🎉 Bạn đã thắng!';
                else if (playerScore < aiScore) resultText = '😢 Máy thắng...';
                else resultText = '🤝 Hòa!';

                ctx.font = 'bold 32px "Segoe UI"';
                ctx.fillText(resultText, W / 2, H / 2 + 20);

                ctx.font = '20px "Segoe UI"';
                ctx.fillStyle = '#aaa';
                ctx.fillText('Nhấn R để chơi lại', W / 2, H / 2 + 60);
            }

            // Goal flash
            if (flashAlpha > 0) {
                ctx.fillStyle = `rgba(255,215,0,${flashAlpha * 0.3})`;
                ctx.fillRect(0, 0, W, H);
            }
        }

        function drawDirectionIndicator() {
            // Show kick direction when near ball
            const d = dist(player, ball);
            const kickDist = player.r + ball.r + 15;
            if (d < kickDist) {
                const dx = ball.x - player.x;
                const dy = ball.y - player.y;
                const dist_ = Math.hypot(dx, dy) || 1;
                const nx = dx / dist_;
                const ny = dy / dist_;

                ctx.setLineDash([5, 5]);
                ctx.beginPath();
                ctx.moveTo(ball.x + nx * ball.r, ball.y + ny * ball.r);
                ctx.lineTo(ball.x + nx * 60, ball.y + ny * 60);
                ctx.strokeStyle = 'rgba(255,215,0,0.5)';
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.setLineDash([]);

                // Arrow head
                const ax = ball.x + nx * 50;
                const ay = ball.y + ny * 50;
                ctx.beginPath();
                ctx.moveTo(ax + nx * 10, ay + ny * 10);
                ctx.lineTo(ax - nx * 5 + ny * 8, ay - ny * 5 - nx * 8);
                ctx.lineTo(ax - nx * 5 - ny * 8, ay - ny * 5 + nx * 8);
                ctx.closePath();
                ctx.fillStyle = 'rgba(255,215,0,0.5)';
                ctx.fill();
            }
        }

        function draw() {
            ctx.clearRect(0, 0, W, H);

            drawField();
            drawParticles();
            drawBall();
            drawDirectionIndicator();
            drawPlayerCircle(player);
            drawPlayerCircle(ai);
            drawOverlay();
        }

        // ===== GAME LOOP =====
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Start
        gameLoop();
        console.log('⚽ Bóng Đá Mini - Sẵn sàng!');
        console.log('   ↑↓←→ / WASD: Di chuyển');
        console.log('   Space / Click: Sút bóng');
        console.log('   R: Chơi lại');
    </script>
</body>
</html>
