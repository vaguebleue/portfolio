<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Bắt Hoa Quả</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: Arial, sans-serif;
        }
        #gameContainer {
            text-align: center;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        #gameCanvas {
            border: 3px solid #333;
            background: #87CEEB;
            display: block;
            margin: 20px auto;
        }
        #score {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            margin: 10px 0;
        }
        #gameOver {
            display: none;
            margin-top: 20px;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover { background: #5568d3; }
        h1 { color: #333; margin-bottom: 10px; }
        .instruction { color: #666; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div id="gameContainer">
        <h1>🍎 Game Bắt Hoa Quả 🍌</h1>
        <div class="instruction">Dùng mũi tên ← → hoặc chạm màn hình để di chuyển</div>
        <div id="score">Điểm: 0</div>
        <canvas id="gameCanvas" width="400" height="500"></canvas>
        <div id="gameOver">
            <h2>Game Over!</h2>
            <p>Điểm của bạn: <span id="finalScore">0</span></p>
            <button onclick="restartGame()">Chơi Lại</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const fruits = ['🍎', '🍌', '🍊', '🍇', '🍓', '🍉', '🍑', '🍒'];
        let basket = { x: 175, y: 450, width: 50, height: 20, speed: 8 };
        let items = [];
        let score = 0;
        let gameRunning = true;
        let keys = {};

        function drawBasket() {
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(basket.x, basket.y, basket.width, basket.height);
            ctx.fillStyle = '#D2691E';
            ctx.fillRect(basket.x + 5, basket.y - 10, basket.width - 10, 10);
        }

        function createItem() {
            return {
                x: Math.random() * (canvas.width - 30),
                y: -30,
                emoji: fruits[Math.floor(Math.random() * fruits.length)],
                speed: 2 + Math.random() * 2
            };
        }

        function drawItem(item) {
            ctx.font = '30px Arial';
            ctx.fillText(item.emoji, item.x, item.y);
        }

        function update() {
            if (!gameRunning) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Move basket
            if (keys['ArrowLeft'] && basket.x > 0) basket.x -= basket.speed;
            if (keys['ArrowRight'] && basket.x < canvas.width - basket.width) basket.x += basket.speed;

            // Add new items
            if (Math.random() < 0.02) items.push(createItem());

            // Update and draw items
            for (let i = items.length - 1; i >= 0; i--) {
                const item = items[i];
                item.y += item.speed;
                drawItem(item);

                // Check collision
                if (item.y + 30 >= basket.y &&
                    item.x + 30 >= basket.x &&
                    item.x <= basket.x + basket.width) {
                    score += 10;
                    document.getElementById('score').textContent = 'Điểm: ' + score;
                    items.splice(i, 1);
                }
                // Remove if missed
                else if (item.y > canvas.height) {
                    items.splice(i, 1);
                    endGame();
                }
            }

            drawBasket();
            requestAnimationFrame(update);
        }

        function endGame() {
            gameRunning = false;
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').style.display = 'block';
        }

        function restartGame() {
            items = [];
            score = 0;
            basket.x = 175;
            gameRunning = true;
            document.getElementById('score').textContent = 'Điểm: 0';
            document.getElementById('gameOver').style.display = 'none';
            update();
        }

        // Controls
        window.addEventListener('keydown', (e) => keys[e.key] = true);
        window.addEventListener('keyup', (e) => keys[e.key] = false);

        // Touch controls for mobile
        let touchStartX = 0;
        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
        });
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touchX = e.touches[0].clientX;
            const delta = touchX - touchStartX;
            basket.x += delta * 0.5;
            basket.x = Math.max(0, Math.min(canvas.width - basket.width, basket.x));
            touchStartX = touchX;
        });

        update();
    </script>
</body>
</html>
